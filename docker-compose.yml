services:
  akasha-db:
    container_name: akasha-db
    image: postgres:18.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./.temp/postgresql:/var/lib/postgresql
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 20s
      test:
        - CMD
        - pg_isready
        - -h
        - 127.0.0.1
        - -p
        - "5432"
        - -q
        - -U
        - ${POSTGRES_USER}
      timeout: 5s

  akasha-backend:
    container_name: akasha-backend
    image: akasha-backend:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7040:7040"
    environment:
      POSTGRES_HOST: akasha-db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      TOKEN_HASH_SECRET: ${TOKEN_HASH_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_OAUTH_REDIRECT_URL: ${GITHUB_OAUTH_REDIRECT_URL}
      WORKER_TOKEN: ${WORKER_TOKEN}

  worker:
    container_name: akasha-worker
    image: akasha-worker:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      akasha-backend:
        condition: service_started
    environment:
      WORKER_TOKEN: ${WORKER_TOKEN}
      MIYOUSHE_COOKIE: ${MIYOUSHE_COOKIE}
      BACKEND_BASE: http://akasha-backend:7040
