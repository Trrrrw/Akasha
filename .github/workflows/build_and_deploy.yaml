name: Build and Deploy

on:
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "Cargo.toml"
      - "Cargo.lock"
      - "assets/**"
      - "frontend/**"
      - "worker/**"
      - "crates/**"
      - ".github/workflows/build_and_deploy.yaml"
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "Cargo.toml"
      - "Cargo.lock"
      - "assets/**"
      - "frontend/**"
      - "worker/**"
      - "crates/**"
      - ".github/workflows/build_and_deploy.yaml"

permissions:
  contents: read
  packages: write

env:
  ALIYUN_REGISTRY: crpi-73ao84573omk8qlo.cn-hangzhou.personal.cr.aliyuncs.com
  ALIYUN_NAMESPACE: akasha
  AKASHA_BACKEND_IMAGE_NAME: akasha-backend
  AKASHA_WORKER_IMAGE_NAME: akasha-worker

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Alibaba Cloud ACR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Build and push Akasha backend
        uses: docker/build-push-action@v6
        with:
          context: .
          target: akasha
          push: ${{ github.event_name == 'push' }}
          cache-from: type=gha,scope=akasha-backend
          cache-to: type=gha,scope=akasha-backend,mode=max
          tags: |
            ghcr.io/trrrrw/${{ env.AKASHA_BACKEND_IMAGE_NAME }}:latest
            ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/${{ env.AKASHA_BACKEND_IMAGE_NAME }}:latest

      - name: Build and push Akasha worker
        uses: docker/build-push-action@v6
        with:
          context: .
          target: worker
          push: ${{ github.event_name == 'push' }}
          cache-from: type=gha,scope=akasha-worker
          cache-to: type=gha,scope=akasha-worker,mode=max
          tags: |
            ghcr.io/trrrrw/${{ env.AKASHA_WORKER_IMAGE_NAME }}:latest
            ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/${{ env.AKASHA_WORKER_IMAGE_NAME }}:latest

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Join tailnet
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy Compose stack
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_TAILSCALE_HOST }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          command_timeout: 40m
          script: |
            cd '${{ secrets.DEPLOY_PATH }}'

            docker login --username='${{ secrets.ALIYUN_REGISTRY_USERNAME }}' \
              --password='${{ secrets.ALIYUN_REGISTRY_PASSWORD }}' \
              '${{ env.ALIYUN_REGISTRY }}'

            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
